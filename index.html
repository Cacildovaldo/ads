<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ebook Ritual Maker - Groq Edition</title>
    <style>
        :root { --primary: #2d3436; --accent: #6c5ce7; --bg: #dfe6e9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; }
        
        .sidebar { width: 350px; background: white; height: 100vh; padding: 25px; position: fixed; box-shadow: 2px 0 10px rgba(0,0,0,0.1); overflow-y: auto; }
        .main { margin-left: 350px; flex: 1; padding: 40px; display: flex; flex-direction: column; align-items: center; }
        
        input, textarea, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: var(--accent); color: white; font-weight: bold; cursor: pointer; border: none; transition: 0.3s; }
        button:hover { opacity: 0.9; }
        button:disabled { background: #ccc; }

        .copy-btn { background: #00b894; margin-top: 10px; }
        
        .ebook-page { 
            background: white; width: 100%; max-width: 800px; padding: 40px; 
            margin-bottom: 30px; border-radius: 4px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            line-height: 1.6; color: #2d3436;
        }
        .emoji-header { font-size: 50px; text-align: center; margin-bottom: 20px; display: block; }
        .page-title { color: var(--accent); border-bottom: 2px solid var(--accent); padding-bottom: 10px; margin-bottom: 20px; }
        
        .progress { width: 100%; height: 8px; background: #eee; border-radius: 4px; margin: 15px 0; display: none; }
        .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: 0.3s; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>📖 Criador de Ebook</h2>
    <p style="font-size: 12px; color: #666;">Use apenas a API da Groq para melhores resultados.</p>
    
    <label>Groq API Key:</label>
    <input type="password" id="apiKey" placeholder="gsk_...">
    
    <label>Título:</label>
    <input type="text" id="title" value="20 Rituais de Axé">
    
    <label>Prompt Base:</label>
    <textarea id="prompt" rows="5">Rituais de Candomblé e Umbanda para amor e riqueza. Liste materiais e passo a passo.</textarea>
    
    <label>Quantidade de Páginas:</label>
    <input type="number" id="qty" value="20">

    <div class="progress" id="pBox"><div class="progress-fill" id="pFill"></div></div>
    <p id="status" style="font-size: 13px; font-weight: bold;"></p>

    <button id="btnGen" onclick="generate()">Gerar Conteúdo</button>
    <button id="btnCopy" class="copy-btn" onclick="copyAllContent()" disabled>Copiar Todo o Ebook</button>
</div>

<div class="main" id="contentArea">
    <div style="color: #999; margin-top: 100px;">O conteúdo gerado aparecerá aqui...</div>
</div>

<script>
    async function generate() {
        const key = document.getElementById('apiKey').value;
        const title = document.getElementById('title').value;
        const promptBase = document.getElementById('prompt').value;
        const qty = parseInt(document.getElementById('qty').value);
        
        if(!key) return alert("Insira a chave da Groq!");

        const btn = document.getElementById('btnGen');
        const area = document.getElementById('contentArea');
        const fill = document.getElementById('pFill');
        const box = document.getElementById('pBox');
        const status = document.getElementById('status');

        btn.disabled = true;
        area.innerHTML = '';
        box.style.display = 'block';

        area.innerHTML = `<div class="ebook-page"><h1>${title}</h1><p>Manual Prático de Rituais</p></div>`;

        for(let i = 1; i <= qty; i++) {
            status.innerText = `Gerando página ${i}...`;
            fill.style.width = `${(i/qty)*100}%`;

            try {
                const data = await callGroq(key, i, promptBase);
                area.innerHTML += `
                    <div class="ebook-page">
                        <span class="emoji-header">${data.emoji}</span>
                        <h2 class="page-title">${i}. ${data.nome}</h2>
                        <p><strong>Materiais:</strong><br>${data.materiais}</p>
                        <p><strong>Passo a Passo:</strong><br>${data.passo_a_passo}</p>
                    </div>`;
            } catch (e) {
                console.error(e);
                status.innerText = "Erro na API. Verifique a chave.";
                break;
            }
        }

        status.innerText = "✅ Concluído!";
        btn.disabled = false;
        document.getElementById('btnCopy').disabled = false;
    }

    async function callGroq(key, index, context) {
        const url = "https://api.groq.com/openai/v1/chat/completions";
        const prompt = `Gere o ritual ${index} sobre: ${context}. 
        Retorne em JSON: {"nome": "Título", "materiais": "lista", "passo_a_passo": "texto", "emoji": "um emoji que represente o ritual"}`;

        const resp = await fetch(url, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({
                model: "llama3-8b-8192",
                messages: [{ role: "user", content: prompt }],
                response_format: { type: "json_object" }
            })
        });

        const json = await resp.json();
        return JSON.parse(json.choices[0].message.content);
    }

    function copyAllContent() {
        const area = document.getElementById('contentArea');
        const range = document.createRange();
        range.selectNode(area);
        window.getSelection().removeAllRanges();
        window.getSelection().addRange(range);
        
        try {
            document.execCommand('copy');
            alert("Todo o conteúdo foi copiado! Agora basta colar no seu documento Word.");
        } catch (err) {
            alert("Erro ao copiar. Tente selecionar manualmente.");
        }
        window.getSelection().removeAllRanges();
    }
</script>

</body>
</html>
