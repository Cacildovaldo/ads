<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI eBook Creator PRO - 100+ Páginas</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --primary: #4f46e5;
            --secondary: #7c3aed;
            --bg: #f8fafc;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: #1e293b; line-height: 1.5; }
        
        .layout { display: grid; grid-template-columns: 400px 1fr; min-height: 100vh; }
        
        /* Sidebar Form */
        .sidebar { 
            background: white; border-right: 1px solid #e2e8f0; padding: 2rem; 
            height: 100vh; overflow-y: auto; position: sticky; top: 0;
        }
        
        .main-content { padding: 2rem; display: flex; flex-direction: column; align-items: center; }
        
        .card { background: white; padding: 1.5rem; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 1.5rem; }
        
        h1 { font-size: 1.5rem; margin-bottom: 1rem; color: var(--primary); }
        label { display: block; font-size: 0.875rem; font-weight: 600; margin-bottom: 0.5rem; }
        
        input, textarea, select { 
            width: 100%; padding: 0.75rem; border: 1px solid #cbd5e1; border-radius: 8px; margin-bottom: 1rem;
            font-family: inherit;
        }

        .btn {
            width: 100%; padding: 0.75rem; border: none; border-radius: 8px; font-weight: 600;
            cursor: pointer; transition: all 0.2s; margin-bottom: 0.5rem;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--secondary); }
        .btn-success { background: #10b981; color: white; }
        
        /* eBook Preview Styles */
        #ebook-render { width: 210mm; background: white; padding: 0; margin: 0 auto; display: none; }
        .ebook-page { 
            width: 210mm; height: 297mm; padding: 20mm; position: relative;
            page-break-after: always; overflow: hidden; background: white;
            border: 1px solid #eee; margin-bottom: 1rem;
        }
        .cover-page { 
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); color: white;
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }
        .page-content img { width: 100%; height: 300px; object-fit: cover; border-radius: 8px; margin: 1rem 0; }
        .page-number { position: absolute; bottom: 10mm; left: 0; right: 0; text-align: center; font-size: 12px; color: #94a3b8; }

        .progress-container { margin: 1rem 0; display: none; }
        .progress-bar { width: 100%; height: 8px; background: #e2e8f0; border-radius: 4px; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: var(--primary); transition: width 0.3s; }
    </style>
</head>
<body>

<div class="layout">
    <aside class="sidebar">
        <h1>📚 AI Ebook Pro</h1>
        
        <div class="card">
            <label>API Key (Gemini)</label>
            <input type="password" id="apiKey" placeholder="AI Studio Key...">
            <button class="btn btn-primary" onclick="saveKey()">Salvar Chave</button>
        </div>

        <form id="ebookForm">
            <label>Título do Ebook</label>
            <input type="text" id="title" required placeholder="Ex: O Futuro da Programação">
            
            <label>Sobre o que é o livro?</label>
            <textarea id="prompt" rows="4" required placeholder="Descreva os tópicos..."></textarea>
            
            <label>Quantidade de Páginas (3 - 100)</label>
            <input type="number" id="pages" min="3" max="100" value="10">
            
            <button type="submit" class="btn btn-primary" id="genBtn">🚀 Gerar Ebook Completo</button>
            <button type="button" class="btn btn-success" id="downloadBtn" disabled onclick="exportPDF()">📥 Baixar PDF Final</button>
        </form>

        <div class="progress-container" id="progCont">
            <p id="progStatus" style="font-size: 12px; margin-bottom: 5px;">Gerando página 1...</p>
            <div class="progress-bar"><div class="progress-fill" id="progFill"></div></div>
        </div>
    </aside>

    <main class="main-content">
        <div id="status">Aguardando comando...</div>
        <div id="ebook-render">
            </div>
    </main>
</div>

<script>
    let ebookData = [];
    const API_URL = "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent";

    function saveKey() {
        const key = document.getElementById('apiKey').value;
        localStorage.setItem('gemini_key', key);
        alert('Chave salva!');
    }

    document.getElementById('ebookForm').onsubmit = async (e) => {
        e.preventDefault();
        const key = localStorage.getItem('gemini_key');
        if(!key) return alert("Insira a API Key primeiro!");

        const btn = document.getElementById('genBtn');
        const render = document.getElementById('ebook-render');
        const progCont = document.getElementById('progCont');
        const progFill = document.getElementById('progFill');
        const progStatus = document.getElementById('progStatus');

        const title = document.getElementById('title').value;
        const prompt = document.getElementById('prompt').value;
        const pages = parseInt(document.getElementById('pages').value);

        // Reset
        btn.disabled = true;
        render.innerHTML = '';
        render.style.display = 'block';
        progCont.style.display = 'block';
        ebookData = [];

        // 1. Gerar Capa
        addPageToRender({ type: 'cover', title: title, subtitle: 'Escrito por IA' });

        // 2. Loop de Geração (Processamento por lotes para não travar)
        for(let i = 1; i <= pages; i++) {
            progStatus.innerText = `Gerando página ${i} de ${pages}...`;
            progFill.style.width = `${(i/pages)*100}%`;

            const content = await callGemini(key, title, prompt, i, pages);
            addPageToRender({ 
                type: 'content', 
                title: content.title, 
                body: content.body, 
                imgPrompt: content.imgPrompt,
                num: i 
            });
            
            // Pequena pausa para evitar rate limit da API
            await new Promise(r => setTimeout(r, 1000));
        }

        btn.disabled = false;
        document.getElementById('downloadBtn').disabled = false;
        progStatus.innerText = "✅ Ebook pronto para download!";
    };

    async function callGemini(key, title, context, pageNum, total) {
        const prompt = `Crie a página ${pageNum} de um ebook de ${total} páginas chamado "${title}". 
        Contexto: ${context}. 
        Retorne em JSON: {"title": "Título do capítulo", "body": "Texto longo da página", "imgPrompt": "Prompt para gerar imagem sobre o assunto"}`;

        const response = await fetch(`${API_URL}?key=${key}`, {
            method: 'POST',
            body: JSON.stringify({
                contents: [{ parts: [{ text: prompt }] }],
                generationConfig: { responseMimeType: "application/json" }
            })
        });
        const data = await response.json();
        return JSON.parse(data.candidates[0].content.parts[0].text);
    }

    function addPageToRender(page) {
        const render = document.getElementById('ebook-render');
        const div = document.createElement('div');
        div.className = `ebook-page ${page.type === 'cover' ? 'cover-page' : 'page-content'}`;
        
        if(page.type === 'cover') {
            div.innerHTML = `<h1>${page.title}</h1><p>${page.subtitle}</p>`;
        } else {
            div.innerHTML = `
                <h2>${page.title}</h2>
                <img src="https://source.unsplash.com/800x600/?${encodeURIComponent(page.imgPrompt)}" alt="Ilustração">
                <p>${page.body}</p>
                <div class="page-number">Página ${page.num}</div>
            `;
        }
        render.appendChild(div);
    }

    function exportPDF() {
        const element = document.getElementById('ebook-render');
        const opt = {
            margin: 0,
            filename: 'meu_ebook_ia.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, useCORS: true },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };
        
        html2pdf().set(opt).from(element).save();
    }
</script>
</body>
</html>
