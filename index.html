<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ebook Ritual Maker PRO - Groq Stable</title>
    <style>
        :root { --primary: #1a1a2e; --accent: #6c5ce7; --text: #2d3436; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; margin: 0; display: flex; }
        
        /* Barra Lateral */
        .sidebar { width: 360px; background: white; height: 100vh; padding: 25px; position: fixed; box-shadow: 2px 0 15px rgba(0,0,0,0.1); overflow-y: auto; z-index: 10; }
        .sidebar h2 { color: var(--accent); margin-bottom: 20px; font-size: 1.5rem; }
        
        label { display: block; margin-top: 15px; font-weight: 600; font-size: 0.9rem; color: #444; }
        input, textarea, button { width: 100%; padding: 12px; margin-top: 8px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-family: inherit; }
        
        button { background: var(--accent); color: white; font-weight: bold; cursor: pointer; border: none; transition: 0.3s; margin-top: 20px; }
        button:hover { background: #5649c0; transform: translateY(-1px); }
        button:disabled { background: #b2bec3; cursor: not-allowed; transform: none; }

        .copy-btn { background: #00b894; }
        .copy-btn:hover { background: #009677; }
        
        /* Área Principal */
        .main { margin-left: 360px; flex: 1; padding: 50px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .progress-container { width: 100%; background: #eee; height: 10px; border-radius: 5px; margin: 20px 0; display: none; }
        .progress-fill { height: 100%; background: var(--accent); width: 0%; border-radius: 5px; transition: width 0.4s ease; }
        
        /* Estilo da Página do Ebook */
        .ebook-page { 
            background: white; width: 100%; max-width: 750px; padding: 50px; 
            margin-bottom: 40px; border-radius: 2px; box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            color: var(--text); position: relative;
        }
        .emoji-box { font-size: 60px; text-align: center; margin-bottom: 25px; display: block; }
        .page-title { color: var(--accent); font-size: 24px; border-bottom: 1px solid #eee; padding-bottom: 15px; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }
        .section-label { font-weight: bold; color: #636e72; text-transform: uppercase; font-size: 0.8rem; margin-top: 20px; display: block; }
        .content-text { font-size: 1.1rem; line-height: 1.7; text-align: justify; white-space: pre-wrap; margin-top: 10px; }
        
        #status-msg { font-size: 0.85rem; color: var(--accent); font-weight: bold; margin-top: 5px; text-align: center; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>🕯️ Ritual AI</h2>
    <p style="font-size: 11px; color: #888;">Configure sua API da Groq Cloud para começar.</p>
    
    <label>Groq API Key:</label>
    <input type="password" id="apiKey" placeholder="gsk_...">
    
    <label>Título do Ebook:</label>
    <input type="text" id="title" value="20 Rituais Sagrados de Axé">
    
    <label>O que o Ebook deve conter?</label>
    <textarea id="prompt" rows="4">Rituais de Candomblé e Umbanda focados em prosperidade financeira e união amorosa. Explique os elementos místicos e o passo a passo de cada ritual.</textarea>
    
    <label>Número de Páginas:</label>
    <input type="number" id="qty" value="20" min="1" max="100">

    <div class="progress-container" id="pBox"><div class="progress-fill" id="pFill"></div></div>
    <div id="status-msg">Pronto para iniciar.</div>

    <button id="btnGen" onclick="generateEbook()">Gerar Ebook Agora</button>
    <button id="btnCopy" class="copy-btn" onclick="copyContent()" disabled>Copiar Conteúdo para o Word</button>
</div>

<div class="main" id="output">
    <div style="color: #b2bec3; text-align: center; margin-top: 150px;">
        <p style="font-size: 40px;">📚</p>
        <p>Preencha os dados e clique em gerar.</p>
    </div>
</div>

<script>
    async function generateEbook() {
        const key = document.getElementById('apiKey').value.trim();
        const title = document.getElementById('title').value;
        const promptInput = document.getElementById('prompt').value;
        const totalPages = parseInt(document.getElementById('qty').value);

        if (!key) return alert("Por favor, insira sua chave API da Groq!");

        const btn = document.getElementById('btnGen');
        const output = document.getElementById('output');
        const fill = document.getElementById('pFill');
        const pBox = document.getElementById('pBox');
        const status = document.getElementById('status-msg');

        // Reset de interface
        btn.disabled = true;
        output.innerHTML = `<div class="ebook-page" style="text-align:center;"><h1>${title}</h1><p>Manual Gerado por Inteligência Artificial</p></div>`;
        pBox.style.display = 'block';

        for (let i = 1; i <= totalPages; i++) {
            status.innerText = `Processando página ${i} de ${totalPages}...`;
            fill.style.width = `${(i / totalPages) * 100}%`;

            try {
                const pageData = await fetchFromGroq(key, i, title, promptInput);
                
                output.innerHTML += `
                    <div class="ebook-page">
                        <span class="emoji-box">${pageData.emoji || '✨'}</span>
                        <h2 class="page-title">${i}. ${pageData.nome}</h2>
                        
                        <span class="section-label">Materiais Necessários</span>
                        <div class="content-text">${pageData.materiais}</div>
                        
                        <span class="section-label">Instruções do Ritual</span>
                        <div class="content-text">${pageData.passo_a_passo}</div>
                    </div>`;
                
                // Scroll suave para a nova página
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });

            } catch (err) {
                console.error("Erro na página " + i, err);
                status.innerText = "Erro na API. Verifique a chave e tente novamente.";
                btn.disabled = false;
                return;
            }
        }

        status.innerText = "✅ Ebook concluído com sucesso!";
        btn.disabled = false;
        document.getElementById('btnCopy').disabled = false;
    }

    async function fetchFromGroq(key, index, ebookTitle, context) {
        const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${key}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                model: "llama3-8b-8192",
                messages: [{
                    role: "user",
                    content: `Você é um mestre em rituais. Gere a página ${index} de um ebook chamado "${ebookTitle}".
                    Tema específico: ${context}.
                    Retorne obrigatoriamente um objeto JSON com estes campos: 
                    "nome" (título do ritual), "materiais" (lista formatada), "passo_a_passo" (texto detalhado), "emoji" (um emoji temático único).`
                }],
                temperature: 0.7,
                response_format: { type: "json_object" }
            })
        });

        if (!response.ok) throw new Error("Falha na rede");

        const result = await response.json();
        return JSON.parse(result.choices[0].message.content);
    }

    function copyContent() {
        const output = document.getElementById('output');
        const range = document.createRange();
        range.selectNode(output);
        window.getSelection().removeAllRanges();
        window.getSelection().addRange(range);
        
        try {
            document.execCommand('copy');
            alert("Conteúdo copiado! Agora cole no seu documento Word.");
        } catch (err) {
            alert("Erro ao copiar. Por favor, selecione o texto manualmente.");
        }
        window.getSelection().removeAllRanges();
    }
</script>

</body>
</html>
