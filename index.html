<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI eBook Creator PRO - Versão Estável</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; display: flex; gap: 20px; }
        .setup-panel { width: 350px; background: white; padding: 20px; border-radius: 10px; height: fit-content; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .preview-panel { flex: 1; background: #ddd; padding: 20px; border-radius: 10px; min-height: 80vh; overflow-y: auto; }
        input, textarea, button { width: 100%; margin-bottom: 15px; padding: 10px; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
        button { cursor: pointer; background: #4f46e5; color: white; font-weight: bold; border: none; }
        button:disabled { background: #ccc; }
        .page { background: white; width: 210mm; min-height: 297mm; padding: 20mm; margin: 0 auto 20px auto; box-shadow: 0 0 10px rgba(0,0,0,0.2); }
        .cover { background: #4f46e5; color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .progress { background: #e0e0e0; height: 10px; border-radius: 5px; margin-bottom: 10px; display: none; }
        .progress-fill { background: #4f46e5; height: 100%; width: 0%; border-radius: 5px; transition: 0.3s; }
        img { max-width: 100%; height: auto; border-radius: 8px; margin: 15px 0; display: block; }
    </style>
</head>
<body>

    <div class="setup-panel">
        <h2>Configuração</h2>
        <input type="password" id="apiKey" placeholder="Sua API Key do Gemini">
        <input type="text" id="title" placeholder="Título do Ebook">
        <textarea id="prompt" rows="5" placeholder="Descreva o conteúdo detalhadamente..."></textarea>
        <label>Páginas (Ex: 50):</label>
        <input type="number" id="pages" value="10" min="3" max="100">
        
        <div class="progress" id="progBar"><div class="progress-fill" id="fill"></div></div>
        <p id="statusText" style="font-size: 12px; color: #666;"></p>

        <button id="btnGen" onclick="startGeneration()">Gerar Ebook</button>
        <button id="btnPdf" onclick="downloadPDF()" disabled style="background: #10b981;">Baixar PDF</button>
    </div>

    <div class="preview-panel" id="renderArea">
        <div style="text-align: center; color: #666; margin-top: 50px;">O preview do seu ebook aparecerá aqui.</div>
    </div>

    <script>
        const API_URL = "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent";

        async function startGeneration() {
            const key = document.getElementById('apiKey').value;
            const title = document.getElementById('title').value;
            const promptStr = document.getElementById('prompt').value;
            const totalPages = parseInt(document.getElementById('pages').value);

            if(!key || !title) return alert("Preencha a Chave API e o Título!");

            const btn = document.getElementById('btnGen');
            const render = document.getElementById('renderArea');
            const fill = document.getElementById('fill');
            const prog = document.getElementById('progBar');
            const status = document.getElementById('statusText');

            btn.disabled = true;
            render.innerHTML = '';
            prog.style.display = 'block';

            // 1. Capa
            render.innerHTML += `<div class="page cover"><h1>${title}</h1><p>Gerado por Inteligência Artificial</p></div>`;

            // 2. Loop de Páginas
            for(let i = 1; i <= totalPages; i++) {
                status.innerText = `Gerando página ${i} de ${totalPages}...`;
                fill.style.width = `${(i / totalPages) * 100}%`;

                try {
                    const content = await callAI(key, title, promptStr, i, totalPages);
                    render.innerHTML += `
                        <div class="page">
                            <h2>${content.capitulo}</h2>
                            <img src="https://image.pollinations.ai/prompt/${encodeURIComponent(content.img_desc)}?width=800&height=600&nologo=true">
                            <p style="text-align: justify; white-space: pre-wrap;">${content.texto}</p>
                            <div style="margin-top:20px; text-align:center; color:#999;">Página ${i}</div>
                        </div>`;
                } catch (err) {
                    console.error(err);
                    status.innerText = "Erro na API. Verifique o console (F12).";
                    break;
                }
                // Delay para evitar bloqueio da API (Rate Limit)
                await new Promise(r => setTimeout(r, 800));
            }

            status.innerText = "✅ Ebook Concluído!";
            btn.disabled = false;
            document.getElementById('btnPdf').disabled = false;
        }

        async function callAI(key, title, context, pageNum, total) {
            const instructions = `Aja como um escritor de ebooks. Escreva a página ${pageNum} de um livro chamado "${title}". 
            Contexto: ${context}. Responda APENAS em formato JSON puro: 
            {"capitulo": "Título da Página", "texto": "Conteúdo com 200 palavras", "img_desc": "descrição curta em inglês para imagem"}`;

            const resp = await fetch(`${API_URL}?key=${key}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: instructions }] }],
                    generationConfig: { responseMimeType: "application/json", temperature: 0.7 }
                })
            });

            if (!resp.ok) throw new Error("Falha na API");
            const data = await resp.json();
            return JSON.parse(data.candidates[0].content.parts[0].text);
        }

        function downloadPDF() {
            const element = document.getElementById('renderArea');
            const opt = {
                margin: 0,
                filename: 'ebook-ia-pro.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 1.5, useCORS: true, logging: false },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
        }
    </script>
</body>
</html>
