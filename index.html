<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ebook Creator Pro - Gerador Comercial com Groq + Imagens</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #7C3AED;
            --secondary: #06B6D4;
            --dark: #0F172A;
            --light: #F8FAFC;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--dark);
            margin: 0;
            display: flex;
        }
        
        /* Painel de Controle */
        .controls {
            width: 420px;
            background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
            padding: 30px;
            height: 100vh;
            position: fixed;
            overflow-y: auto;
            box-shadow: 4px 0 20px rgba(0,0,0,0.5);
            z-index: 100;
            border-right: 1px solid rgba(124, 58, 237, 0.3);
        }
        
        .controls h2 {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 1.8rem;
            text-align: center;
            margin-bottom: 25px;
        }
        
        .api-badge {
            background: rgba(124, 58, 237, 0.2);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid rgba(124, 58, 237, 0.3);
        }
        
        .controls label {
            display: block;
            margin-top: 15px;
            margin-bottom: 6px;
            color: #CBD5E1;
            font-weight: 600;
            font-size: 0.85rem;
        }
        
        input, textarea, select {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #334155;
            background: #1E293B;
            color: white;
            font-family: inherit;
        }
        
        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(124, 58, 237, 0.2);
        }
        
        button {
            width: 100%;
            padding: 14px;
            margin-top: 15px;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1rem;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }
        
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(124, 58, 237, 0.3);
        }
        
        .btn-pdf {
            background: linear-gradient(135deg, #10B981, #059669);
            color: white;
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Área do Ebook */
        .preview {
            margin-left: 420px;
            padding: 40px;
            width: calc(100% - 420px);
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #1A1F2E;
            min-height: 100vh;
        }
        
        /* Estilo das Páginas para PDF */
        .ebook-page {
            width: 210mm;
            min-height: 297mm;
            background: white;
            margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            position: relative;
            page-break-after: always;
            box-sizing: border-box;
            border-radius: 8px;
            overflow: hidden;
        }
        
        .cover-page {
            background: linear-gradient(135deg, #7C3AED 0%, #06B6D4 100%);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px;
        }
        
        .cover-page h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            font-weight: 800;
        }
        
        .content-page {
            padding: 40px;
        }
        
        .content-page h2 {
            color: var(--primary);
            font-size: 1.8rem;
            margin-bottom: 20px;
            border-left: 4px solid var(--primary);
            padding-left: 15px;
        }
        
        .page-image {
            width: 100%;
            max-height: 300px;
            object-fit: cover;
            border-radius: 16px;
            margin: 20px 0;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            background: #f0f0f0;
        }
        
        .page-content {
            line-height: 1.7;
            color: #334155;
            font-size: 1rem;
        }
        
        .page-number {
            text-align: center;
            margin-top: 30px;
            color: #94A3B8;
            font-size: 0.8rem;
            border-top: 1px solid #E2E8F0;
            padding-top: 15px;
        }
        
        .progress-container {
            margin-top: 20px;
            background: #334155;
            height: 6px;
            border-radius: 3px;
            overflow: hidden;
            display: none;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            width: 0%;
            transition: width 0.3s;
        }
        
        .status {
            margin-top: 12px;
            font-size: 0.8rem;
            text-align: center;
            padding: 8px;
            border-radius: 8px;
        }
        
        .status-success { background: rgba(16, 185, 129, 0.2); color: #10B981; }
        .status-error { background: rgba(239, 68, 68, 0.2); color: #EF4444; }
        .status-info { background: rgba(124, 58, 237, 0.2); color: #A78BFA; }
        
        .info-note {
            background: rgba(245, 158, 11, 0.1);
            border-left: 3px solid #F59E0B;
            padding: 10px;
            font-size: 0.75rem;
            margin-top: 15px;
            color: #FCD34D;
        }
        
        @media (max-width: 900px) {
            .controls {
                width: 100%;
                height: auto;
                position: relative;
            }
            .preview {
                margin-left: 0;
                width: 100%;
            }
            .ebook-page {
                width: 100%;
                min-height: auto;
            }
        }
        
        @media print {
            body {
                background: white;
            }
            .controls, .info-note {
                display: none;
            }
            .preview {
                margin: 0;
                padding: 0;
                background: white;
            }
            .ebook-page {
                box-shadow: none;
                margin: 0;
                page-break-after: always;
            }
        }
    </style>
</head>
<body>

<div class="controls">
    <h2>📚 Ebook Creator Pro</h2>
    
    <div class="api-badge">
        <label>🔑 API Key da Groq (Texto)</label>
        <input type="password" id="groqKey" placeholder="groq_... | Obtenha em console.groq.com">
        
        <label style="margin-top: 12px;">🎨 API de Imagem (Opcional - Para imagens reais)</label>
        <select id="imageProvider">
            <option value="placeholder">📷 Placeholders Profissionais (Gratuito)</option>
            <option value="unsplash">🖼️ Unsplash API (Gratuito - 50 req/hora)</option>
            <option value="dalle">🎨 DALL-E 3 (Pago - $0.04/imagem)</option>
        </select>
        <input type="password" id="imageApiKey" placeholder="API Key para imagens (se selecionado)">
        <div class="info-note">💡 Dica: Placeholders já são profissionais e prontos para comercialização. Para imagens únicas, use Unsplash (gratuito) ou DALL-E (pago).</div>
    </div>
    
    <label>📖 Título do Ebook</label>
    <input type="text" id="title" value="Guia Prático de Produtividade com IA">
    
    <label>📝 Tema e Descrição</label>
    <textarea id="prompt" rows="4">Crie um ebook profissional sobre produtividade usando Inteligência Artificial. Inclua ferramentas práticas, workflows, dicas avançadas e cases de sucesso. O conteúdo deve ser rico, detalhado e inspirador para profissionais e empreendedores.</textarea>
    
    <label>📄 Número de Capítulos (3 a 30)</label>
    <input type="range" id="chapters" min="3" max="30" value="8">
    <div style="text-align: center; margin-top: 5px;"><span id="chaptersValue">8</span> capítulos</div>
    
    <div class="progress-container" id="progressContainer">
        <div class="progress-fill" id="progressFill"></div>
    </div>
    <div id="status" class="status"></div>
    
    <button id="generateBtn" class="btn-primary" onclick="generateEbook()">✨ Gerar Ebook Completo</button>
    <button id="downloadBtn" class="btn-pdf" onclick="downloadPDF()" disabled>📥 Baixar PDF (Imagens Incluídas)</button>
</div>

<div class="preview" id="previewArea">
    <div style="text-align: center; padding: 60px; color: #94A3B8;">
        <p>✨ Configure sua API Key e clique em "Gerar Ebook"</p>
        <p style="font-size: 0.8rem; margin-top: 10px;">O conteúdo será gerado com IA e as imagens serão adicionadas automaticamente</p>
    </div>
</div>

<script>
    let ebookHTML = [];
    let isGenerating = false;
    let generatedContent = false;
    
    // Atualizar valor do slider
    document.getElementById('chapters').addEventListener('input', function() {
        document.getElementById('chaptersValue').textContent = this.value;
    });
    
    function showStatus(message, type) {
        const statusEl = document.getElementById('status');
        statusEl.textContent = message;
        statusEl.className = `status status-${type}`;
    }
    
    function updateProgress(percent) {
        const container = document.getElementById('progressContainer');
        const fill = document.getElementById('progressFill');
        container.style.display = 'block';
        fill.style.width = `${percent}%`;
    }
    
    async function generateEbook() {
        const groqKey = document.getElementById('groqKey').value.trim();
        if (!groqKey) {
            showStatus('❌ Insira sua API Key da Groq (gratuita em console.groq.com)', 'error');
            return;
        }
        
        if (isGenerating) {
            showStatus('⏳ Geração em andamento...', 'info');
            return;
        }
        
        isGenerating = true;
        const generateBtn = document.getElementById('generateBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        generateBtn.disabled = true;
        downloadBtn.disabled = true;
        
        const title = document.getElementById('title').value.trim();
        const promptBase = document.getElementById('prompt').value.trim();
        const chaptersCount = parseInt(document.getElementById('chapters').value);
        const imageProvider = document.getElementById('imageProvider').value;
        const imageApiKey = document.getElementById('imageApiKey').value.trim();
        
        const previewArea = document.getElementById('previewArea');
        previewArea.innerHTML = '';
        ebookHTML = [];
        
        showStatus(`🚀 Gerando ${chaptersCount} capítulos... Isso pode levar alguns minutos.`, 'info');
        
        // Capa
        const coverHTML = `
            <div class="ebook-page cover-page">
                <h1>${escapeHtml(title)}</h1>
                <p style="font-size: 1.2rem; margin-top: 20px;">Um guia completo para transformar seu conhecimento</p>
                <p style="margin-top: 60px; font-size: 0.9rem; opacity: 0.8;">Gerado com Inteligência Artificial • ${new Date().getFullYear()}</p>
            </div>
        `;
        previewArea.innerHTML = coverHTML;
        ebookHTML.push(coverHTML);
        
        // Gerar cada capítulo
        for (let i = 1; i <= chaptersCount; i++) {
            const percent = (i / chaptersCount) * 100;
            updateProgress(percent);
            showStatus(`📝 Gerando capítulo ${i} de ${chaptersCount}...`, 'info');
            
            try {
                // Gerar conteúdo com Groq
                const chapterContent = await generateChapterWithGroq(groqKey, i, chaptersCount, title, promptBase);
                
                // Gerar imagem para o capítulo
                let imageUrl = await generateChapterImage(chapterContent.title, i, imageProvider, imageApiKey);
                
                const chapterHTML = `
                    <div class="ebook-page content-page">
                        <h2>${i}. ${escapeHtml(chapterContent.title)}</h2>
                        <img class="page-image" src="${imageUrl}" alt="${escapeHtml(chapterContent.title)}" crossorigin="anonymous">
                        <div class="page-content">
                            ${escapeHtml(chapterContent.content).replace(/\n/g, '<br>')}
                        </div>
                        <div class="page-number">${escapeHtml(title)} • Capítulo ${i} de ${chaptersCount}</div>
                    </div>
                `;
                
                previewArea.innerHTML += chapterHTML;
                ebookHTML.push(chapterHTML);
                
                // Pequeno delay para não sobrecarregar
                await delay(500);
                
            } catch (error) {
                console.error(`Erro no capítulo ${i}:`, error);
                const fallbackHTML = `
                    <div class="ebook-page content-page">
                        <h2>${i}. Capítulo ${i}</h2>
                        <div class="page-content">
                            <p>Conteúdo sobre ${escapeHtml(title)}. Explore os conceitos fundamentais e aplicações práticas deste tema transformador.</p>
                            <p style="margin-top: 15px;">Este capítulo traz insights valiosos para sua jornada de aprendizado e desenvolvimento pessoal.</p>
                        </div>
                        <div class="page-number">${escapeHtml(title)} • Capítulo ${i} de ${chaptersCount}</div>
                    </div>
                `;
                previewArea.innerHTML += fallbackHTML;
                ebookHTML.push(fallbackHTML);
            }
        }
        
        updateProgress(100);
        showStatus(`✅ Ebook gerado com sucesso! ${chaptersCount} capítulos prontos. Clique em "Baixar PDF" para salvar.`, 'success');
        downloadBtn.disabled = false;
        generatedContent = true;
        isGenerating = false;
        generateBtn.disabled = false;
    }
    
    async function generateChapterWithGroq(apiKey, chapterNum, total, bookTitle, theme) {
        const url = "https://api.groq.com/openai/v1/chat/completions";
        
        const prompt = `Crie o capítulo ${chapterNum} de ${total} para o ebook "${bookTitle}".
        
        Tema geral: ${theme}
        
        Responda APENAS com JSON neste formato:
        {
            "title": "Título do Capítulo (até 8 palavras, cativante)",
            "content": "Conteúdo detalhado do capítulo com 200-300 palavras, bem estruturado, com parágrafos, dicas práticas e insights valiosos"
        }
        
        O conteúdo deve ser profissional, rico em informações e útil para o leitor.`;
        
        const response = await fetch(url, {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${apiKey}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                model: "llama-3.3-70b-versatile",
                messages: [
                    { role: "system", content: "Você é um escritor profissional de ebooks. Sempre responda com JSON válido e conteúdo de alta qualidade." },
                    { role: "user", content: prompt }
                ],
                temperature: 0.8,
                max_tokens: 1000
            })
        });
        
        if (!response.ok) {
            throw new Error(`API Groq error: ${response.status}`);
        }
        
        const data = await response.json();
        let content = data.choices[0].message.content;
        
        // Extrair JSON
        const jsonMatch = content.match(/\{[\s\S]*\}/);
        if (jsonMatch) {
            content = jsonMatch[0];
        }
        
        const parsed = JSON.parse(content);
        
        return {
            title: parsed.title || `Capítulo ${chapterNum}`,
            content: parsed.content || `Conteúdo do capítulo ${chapterNum} sobre ${bookTitle}. Explore este tema fascinante e descubra novos conhecimentos.`
        };
    }
    
    async function generateChapterImage(chapterTitle, chapterNum, provider, apiKey) {
        // Placeholders profissionais e gratuitos (funcionam 100% no PDF)
        if (provider === 'placeholder' || !apiKey) {
            const colors = ['7C3AED', '06B6D4', '10B981', 'F59E0B', 'EF4444', 'EC4899'];
            const color = colors[chapterNum % colors.length];
            const text = encodeURIComponent(chapterTitle.substring(0, 40));
            return `https://placehold.co/800x400/${color}/white?text=${text}`;
        }
        
        // Unsplash API (gratuito, precisa de chave)
        if (provider === 'unsplash' && apiKey) {
            try {
                const query = encodeURIComponent(`${chapterTitle} book illustration`);
                const response = await fetch(`https://api.unsplash.com/search/photos?query=${query}&per_page=1&client_id=${apiKey}`);
                const data = await response.json();
                if (data.results && data.results[0]) {
                    return data.results[0].urls.regular;
                }
            } catch (e) {
                console.warn('Unsplash fallback');
            }
            return `https://placehold.co/800x400/7C3AED/white?text=${encodeURIComponent(chapterTitle)}`;
        }
        
        // DALL-E (requer OpenAI key paga)
        if (provider === 'dalle' && apiKey) {
            try {
                const response = await fetch('https://api.openai.com/v1/images/generations', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: "dall-e-3",
                        prompt: `Professional illustration for ebook chapter: ${chapterTitle}, clean, modern, professional style`,
                        n: 1,
                        size: "1024x1024"
                    })
                });
                const data = await response.json();
                if (data.data && data.data[0]) {
                    return data.data[0].url;
                }
            } catch (e) {
                console.warn('DALL-E fallback');
            }
            return `https://placehold.co/800x400/7C3AED/white?text=${encodeURIComponent(chapterTitle)}`;
        }
        
        return `https://placehold.co/800x400/7C3AED/white?text=${encodeURIComponent(chapterTitle)}`;
    }
    
    function downloadPDF() {
        if (!generatedContent) {
            showStatus('❌ Nenhum ebook gerado. Clique em "Gerar Ebook" primeiro.', 'error');
            return;
        }
        
        showStatus('📄 Gerando PDF profissional...', 'info');
        
        const element = document.getElementById('previewArea');
        const opt = {
            margin: [0, 0, 0, 0],
            filename: `ebook_${Date.now()}.pdf`,
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { 
                scale: 2,
                useCORS: true,
                logging: false,
                letterRendering: true
            },
            jsPDF: { 
                unit: 'mm', 
                format: 'a4', 
                orientation: 'portrait' 
            }
        };
        
        html2pdf().set(opt).from(element).save()
            .then(() => {
                showStatus('✅ PDF baixado com sucesso! Todas as imagens estão incluídas.', 'success');
            })
            .catch((error) => {
                console.error('PDF Error:', error);
                showStatus('⚠️ Erro ao gerar PDF. Tente novamente ou reduza o número de capítulos.', 'error');
            });
    }
    
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    function delay(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
    }
</script>

</body>
</html>
